<!-- Global error catcher -->
<script>
window.addEventListener('error', function(e) {
  var el = document.getElementById('monitoring-root');
  if (el) el.innerHTML = '<div style="color:red;font-family:monospace;padding:20px;background:#fff0f0;border:1px solid #fcc;border-radius:6px;margin:20px">JS XATO: ' + e.message + '<br>Fayl: ' + (e.filename||'').split('/').pop() + ':' + e.lineno + '</div>';
});
window.addEventListener('unhandledrejection', function(e) {
  var el = document.getElementById('monitoring-root');
  if (el) el.innerHTML = '<div style="color:red;font-family:monospace;padding:20px;background:#fff0f0;border:1px solid #fcc;border-radius:6px;margin:20px">Promise XATO: ' + e.reason + '</div>';
});
</script>

<script>
(function checkDeps() {
  function ok(id, label) {
    var el = document.getElementById(id);
    if (el) { el.textContent = label + ': OK'; el.style.color = '#4ade80'; }
  }
  function fail(id, label) {
    var el = document.getElementById(id);
    if (el) { el.textContent = label + ': YUKLANMADI'; el.style.color = '#f87171'; }
  }
  if (window.React)      ok('d-react', 'React');   else fail('d-react', 'React');
  if (window.ReactDOM)   ok('d-rdom', 'ReactDOM'); else fail('d-rdom', 'ReactDOM');
  if (window.Babel)      ok('d-babel', 'Babel');   else fail('d-babel', 'Babel');
  if (window.LucideReact || window.lucideReact) ok('d-lucide', 'Lucide'); else fail('d-lucide', 'Lucide');
  var all = window.React && window.ReactDOM && window.Babel;
  var stat = document.getElementById('d-status');
  if (stat) stat.textContent = all ? '✓ Barcha kutubxonalar yuklandi' : '✗ Ba\'zi kutubxonalar yuklanmadi (internet?)';
})();
</script>

                          <span className="px-1.5 py-0.5 bg-blue-50 border border-blue-200 text-[#014e96] rounded text-[9px] font-bold animate-pulse">ACTIVE</span>}

                    ))}
                  </ul>
                  <div className="mt-3 pt-3 border-t border-slate-200 text-[10px] text-slate-400 italic">
                    {t("* LTO batareyalar -40°C gacha barqaror. Har bir avtobus to'liq sertifikatlangan.", "* Satellite-linked tracking verifies chassis stress and HV circuit status 24/7.")}
                  </div>
                </div>

                <div className="mt-4 pt-4 border-t border-slate-200 flex flex-col sm:flex-row justify-between items-center gap-3">
                  <span className="text-[10px] font-mono text-slate-400 italic">{t("Tizim: AES-256 xavfsiz kanal (Andijon ↔ Lanzhou).", "System: AES-256 secured channel (Andijan ↔ Lanzhou).")}</span>
                  <div className="flex gap-2">
                    <button onClick={() => alert(t("PDF hujjat yuklab olindi! (Demo)", "Contract PDF exported! (Demo)"))}
                      className="flex items-center gap-1.5 px-3 py-1.5 bg-white border border-slate-200 rounded-lg text-[10px] font-bold text-slate-700 font-mono cursor-pointer hover:bg-slate-50">
                      <FileText className="w-3.5 h-3.5 text-[#014e96]"/>
                      {t("Hujjatlar (PDF)", "Contract PDF")}
                    </button>
                    <button onClick={() => alert(t("Jurnal yuklab olindi! (Demo)", "Log exported! (Demo)"))}
                      className="flex items-center gap-1 px-3 py-1.5 bg-emerald-50 border border-emerald-200 rounded-lg text-[10px] font-bold text-emerald-700 font-mono cursor-pointer hover:bg-emerald-100">
                      <Download className="w-3.5 h-3.5"/>
                      {t("Jurnal (.TXT)", "Export log")}

              {/* Order detail sidebar */}
              <div className="xl:col-span-4 bg-slate-50 border border-slate-200 rounded-xl p-5 flex flex-col gap-4">
                <div className="flex items-center gap-2 border-b border-slate-200 pb-3">
                  <Layers className="w-4 h-4 text-[#014e96]"/>
                  <span className="text-xs uppercase tracking-widest font-black text-slate-700 font-mono">{t("BUYURTMA TAFSILOTI", "Order Dossier")}</span>
                </div>

                {[
                  { label: { uz: 'Buyurtma ID:', en: 'Order ID:' }, value: activeOrder.id, cls: 'font-mono font-black text-slate-800' },
                  { label: { uz: 'Xaridor:', en: 'Buyer:' }, value: activeOrder.client[currentLang], cls: 'font-bold text-slate-700' },
                  { label: { uz: 'Transport turi:', en: 'Vehicle spec:' }, value: activeOrder.qty[currentLang], cls: 'font-black text-[#014e96] font-mono text-xs' },
                  { label: { uz: 'Topshirish muddati:', en: 'Handover date:' }, value: activeOrder.deliverDate[currentLang], cls: 'font-bold text-amber-600 font-mono' },
                  { label: { uz: 'Yuk tashuvchi:', en: 'Carrier:' }, value: activeOrder.carrier[currentLang], cls: 'font-semibold text-slate-700' },
                  { label: { uz: 'Yetkazish manzili:', en: 'Destination:' }, value: activeOrder.destination[currentLang], cls: 'font-medium text-slate-700 text-[11px]' },
                ].map((item, i) => (
                  <div key={i} className="bg-white border border-slate-200 rounded-lg p-3 shadow-sm">
                    <div className="text-[8px] text-slate-400 uppercase font-black mb-0.5">{item.label[currentLang]}</div>
                    <div className={'text-xs leading-tight ' + item.cls}>{item.value}</div>
                  </div>
                ))}

                <div className="bg-white border border-slate-200 rounded-xl p-3.5 mt-auto">
                  <div className="text-[8px] font-mono text-slate-400 uppercase font-bold flex items-center gap-1 mb-1.5">
                    <ShieldAlert className="w-3.5 h-3.5 text-blue-600"/>
                    <span>IP68 DATCHIK KAFOLATI</span>
                  </div>
                  <p className="text-[10px] text-slate-600 leading-relaxed font-mono">
                    {t("Har bir avtobus IP68 himoya darajasiga ega datchiklar bilan sinovdan o'tgan.", "All vehicles certified with IP68 dust/water resistant sensor modules.")}
                  </p>
                </div>
              </div>
            </div>
          </div>

        </div>
      </div>
    );
  }

  /* ---- APP ROOT ---- */
  function MonitoringApp() {
    const [lang, setLang] = useState('uz');

    useEffect(() => {
      const stored = localStorage.getItem('cambell_lang') || 'uz';
      setLang(stored === 'ru' ? 'en' : stored);

      function onLangChange(e) {
        const l = (e.detail && e.detail.lang) || 'uz';
        setLang(l === 'ru' ? 'en' : l);
      }
      document.addEventListener('languageChanged', onLangChange);
      return function() { document.removeEventListener('languageChanged', onLangChange); };
    }, []);

    return React.createElement(FactoryMonitoring, { currentLang: lang });
  }

  /* ---- MOUNT ---- */
  try {
    var domNode = document.getElementById('monitoring-root');
    if (domNode) {
      var root = ReactDOM.createRoot(domNode);
      root.render(React.createElement(MonitoringApp, null));
    }
  } catch(err) {
    console.error('Monitoring mount error:', err);
    var errEl = document.getElementById('monitoring-root');
    if (errEl) errEl.innerHTML = '<div class="mon-error">Xato: ' + err.message + '</div>';
  }

})();
</script>

<!-- Manual Babel.transform – uses classic runtime (no import statements) -->
<script>
document.addEventListener('DOMContentLoaded', function() {
  var stat = document.getElementById('d-status');
  function setStatus(msg, color) {
    if (stat) { stat.textContent = msg; stat.style.color = color || '#fbbf24'; }
  }
  try {
    if (!window.Babel)    { setStatus('✗ Babel yuklanmadi', '#f87171'); return; }
    if (!window.React)    { setStatus('✗ React yuklanmadi', '#f87171'); return; }
    if (!window.ReactDOM) { setStatus('✗ ReactDOM yuklanmadi', '#f87171'); return; }

    var srcEl = document.getElementById('mon-jsx');
    if (!srcEl) { setStatus('✗ JSX manba topilmadi', '#f87171'); return; }

    setStatus('Babel.transform ishlanmoqda...', '#fbbf24');

    var compiled = Babel.transform(srcEl.textContent, {
      presets: [['react', { runtime: 'classic', pragma: 'React.createElement', pragmaFrag: 'React.Fragment' }]],
      filename: 'monitoring.jsx'
    }).code;

    setStatus('Komponent ishga tushirilmoqda...', '#fbbf24');

    // Execute compiled code; React & ReactDOM passed as args to avoid global conflicts
    var fn = new Function('React', 'ReactDOM', compiled);
    fn(window.React, window.ReactDOM);

    setStatus('✓ Monitoring ishlayapti', '#4ade80');
  } catch(e) {
    setStatus('✗ ' + e.message, '#f87171');
    var root = document.getElementById('monitoring-root');
    if (root) root.innerHTML =
      '<div style="color:red;font-family:monospace;padding:24px;background:#fff0f0;border:1px solid #fcc;border-radius:8px;margin:24px">' +
      '<b>Xato:</b> ' + e.message +
      (e.stack ? '<br><pre style="font-size:10px;margin-top:8px;white-space:pre-wrap">' + e.stack.slice(0,600) + '</pre>' : '') +
      '</div>';
  }
});
</script>
